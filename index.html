<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Тренировочный план</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #2b2b2b; color: #fff; min-height: 100vh; display: flex; justify-content: center; align-items: center; transition: background 0.3s; position: relative; overflow: hidden; touch-action: none; }
    .bg-layers { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
    #bgLayer { width: 100%; height: 100%; background: #2b2b2b; }
    #gradientLayer { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
    #imageLayer { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; background-size: cover; background-position: center; opacity: 0.15; }

    .app-window { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; touch-action: none; pointer-events: none; }
    .app-container { position: relative; z-index: 1; width: 100%; padding: 16px 12px 20px; background: rgba(20,20,30,0.6); backdrop-filter: blur(12px); border-radius: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; align-items: center; pointer-events: auto; }

    .drag-arrow { position: absolute; bottom: 6px; right: 10px; width: 28px; height: 28px; cursor: grab; z-index: 10; pointer-events: auto; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); transition: 0.2s; color: rgba(255,255,255,0.4); font-size: 16px; touch-action: none; }
    .drag-arrow:hover { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); }
    .drag-arrow:active { cursor: grabbing; }
    .app-window.dragging .drag-arrow { cursor: grabbing; background: rgba(255,215,0,0.15); color: #ffd54f; }
    .app-window.dragging .app-container { pointer-events: none; }

    @media (max-width: 480px) {
      .app-window { max-width: 92vw; transform: none; left: 4vw; top: 10px; }
      .app-container { padding: 12px 8px 14px; border-radius: 24px; }
      .calendar-wrapper { padding: 6px 4px; }
      .week-day-cell { font-size: 0.7rem; border-radius: 10px; }
      .tasks-panel { padding: 8px 6px; min-height: 80px; }
      .task-item { padding: 4px 6px; font-size: 0.75rem; }
      .timer-display, .stopwatch-display { font-size: 1.8rem; }
      .drag-arrow { bottom: 4px; right: 6px; width: 24px; height: 24px; font-size: 14px; }
      .calendar-header .month-year { font-size: 0.9rem; }
      .calendar-header button { font-size: 1rem; padding: 2px 8px; }
    }

    .top-bar { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 0 4px; position: relative; z-index: 6; pointer-events: auto; }
    .balance-area { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.3); padding: 6px 14px 6px 12px; border-radius: 30px; font-weight: 600; font-size: 1.1rem; border: 1px solid rgba(255,215,0,0.2); pointer-events: auto; }
    .balance-area .icon { font-size: 1.2rem; margin-right: 2px; }
    .balance-area .value { min-width: 40px; text-align: center; }
    .balance-area.negative .value { color: #ff6b6b; }
    .music-controls { display: flex; gap: 6px; background: rgba(0,0,0,0.25); padding: 4px 10px; border-radius: 30px; align-items: center; pointer-events: auto; }
    .music-controls button { background: transparent; border: none; color: #fff; font-size: 1.2rem; cursor: pointer; padding: 2px 6px; transition: 0.2s; opacity: 0.8; pointer-events: auto; }
    .music-controls button:hover { opacity: 1; transform: scale(1.1); }
    .settings-btn { background: rgba(255,255,255,0.08); border: none; color: #fff; font-size: 1.4rem; cursor: pointer; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; pointer-events: auto; }

    .calendar-wrapper { width: 100%; margin: 6px 0 12px; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); border-radius: 20px; padding: 10px 6px; overflow: hidden; transition: background 0.3s; touch-action: pan-y; pointer-events: auto; position: relative; z-index: 2; }
    .calendar-header { display: flex; justify-content: space-between; align-items: center; padding: 0 4px 8px 4px; font-weight: 500; pointer-events: auto; }
    .calendar-header .month-year { display: flex; align-items: center; gap: 8px; }
    .calendar-header .month-year span { cursor: pointer; padding: 2px 6px; border-radius: 8px; transition: 0.15s; pointer-events: auto; }
    .calendar-header .month-year span:hover { background: rgba(255,255,255,0.1); }
    .calendar-header button { background: rgba(255,255,255,0.06); border: none; color: #fff; font-size: 1.2rem; cursor: pointer; padding: 2px 10px; border-radius: 30px; transition: 0.2s; pointer-events: auto; }
    .calendar-header button:hover { background: rgba(255,255,255,0.15); }
    
    .weekday-names { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 4px; font-size: 0.65rem; color: rgba(255,255,255,0.4); text-align: center; padding: 0 2px; }
    .weekday-names span { padding: 2px 0; }
    
    .week-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; transition: max-height 0.3s ease, opacity 0.3s ease; overflow: hidden; pointer-events: auto; }
    .week-days.hidden { max-height: 0 !important; opacity: 0; margin: 0; padding: 0; pointer-events: none; }
    .week-day-cell { aspect-ratio: 1/1; background: rgba(255,255,255,0.08); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 500; transition: 0.15s; position: relative; cursor: pointer; border: 1px solid transparent; touch-action: none; pointer-events: auto; }
    .week-day-cell.today { background: rgba(255,215,0,0.25); border-color: rgba(255,215,0,0.5); }
    .week-day-cell.completed { background: #2e7d32; border-color: #4caf50; }
    .week-day-cell.completed::after { content: "✓"; position: absolute; top: 2px; left: 6px; font-size: 0.7rem; color: #81c784; }
    .week-day-cell.missed { background: #7a2e2e; border-color: #e53935; }
    .week-day-cell.missed::after { content: "✕"; position: absolute; top: 2px; left: 6px; font-size: 0.7rem; color: #ef9a9a; }
    .week-day-cell.selected { border-color: #ffd54f; box-shadow: 0 0 0 2px rgba(255,213,79,0.3); }
    .week-day-cell .day-num { font-size: 0.9rem; }
    .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 6px; max-height: 0; overflow: hidden; transition: max-height 0.4s ease, opacity 0.3s ease; opacity: 0; pointer-events: auto; }
    .month-grid.open { max-height: 400px; opacity: 1; overflow-y: auto; }
    .month-grid .week-day-cell { cursor: pointer; background: rgba(255,255,255,0.06); }
    .month-grid .week-day-cell:hover { background: rgba(255,255,255,0.15); transform: scale(1.03); }
    .month-grid .week-day-cell.empty { background: transparent; cursor: default; }

    .tasks-panel { width: 100%; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); border-radius: 20px; padding: 12px 10px; margin: 6px 0 10px; min-height: 100px; pointer-events: auto; position: relative; z-index: 2; }
    .tasks-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-weight: 500; color: #aaa; font-size: 0.9rem; }
    .tasks-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .task-item { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.04); padding: 6px 10px 6px 8px; border-radius: 12px; transition: 0.15s; pointer-events: auto; }
    .task-item .checkbox { width: 20px; height: 20px; border-radius: 6px; border: 2px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: 0.15s; font-size: 0.7rem; color: #4caf50; pointer-events: auto; }
    .task-item .checkbox.done { background: #4caf50; border-color: #4caf50; color: #fff; }
    .task-item .task-text { flex: 1; font-size: 0.85rem; line-height: 1.3; }
    .task-item .task-points { font-size: 0.7rem; color: #ffd54f; background: rgba(255,215,0,0.12); padding: 2px 8px; border-radius: 30px; }
    .task-item.done .task-text { opacity: 0.6; text-decoration: line-through; }
    .btn-done { width: 100%; padding: 10px; margin-top: 6px; border: none; border-radius: 16px; font-weight: 700; font-size: 1rem; background: #37474f; color: #aaa; cursor: not-allowed; transition: 0.2s; pointer-events: auto; }
    .btn-done.active { background: #2e7d32; color: #fff; cursor: pointer; }
    .btn-done.active:hover { background: #388e3c; transform: scale(1.01); }
    .btn-done.hidden { display: none; }

    .timer-row { display: flex; gap: 10px; width: 100%; margin-top: 6px; flex-wrap: wrap; justify-content: center; pointer-events: auto; position: relative; z-index: 2; }
    .timer-row button { flex: 1; padding: 10px; border: none; border-radius: 16px; background: rgba(255,255,255,0.06); color: #fff; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: 0.2s; border: 1px solid rgba(255,255,255,0.05); min-width: 70px; pointer-events: auto; }
    .timer-row button:hover { background: rgba(255,255,255,0.12); }
    .timer-row button.active-toggle { background: rgba(255,215,0,0.15); border-color: #ffd54f; }

    .timer-panel, .stopwatch-panel, .stats-panel { width: 100%; background: rgba(0,0,0,0.35); backdrop-filter: blur(8px); border-radius: 16px; padding: 14px 12px; margin-top: 8px; display: none; flex-direction: column; align-items: center; gap: 8px; pointer-events: auto; position: relative; z-index: 2; }
    .timer-panel.active, .stopwatch-panel.active, .stats-panel.active { display: flex; }
    .timer-display, .stopwatch-display { font-size: 2.4rem; font-weight: 600; letter-spacing: 2px; font-variant-numeric: tabular-nums; background: rgba(0,0,0,0.3); padding: 4px 16px; border-radius: 16px; }
    .timer-controls, .stopwatch-controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .timer-controls button, .stopwatch-controls button { padding: 6px 16px; border: none; border-radius: 30px; font-weight: 600; cursor: pointer; background: rgba(255,255,255,0.08); color: #fff; transition: 0.2s; pointer-events: auto; }
    .timer-controls button:hover, .stopwatch-controls button:hover { background: rgba(255,255,255,0.18); }
    .timer-controls .start-btn { background: #2e7d32; }
    .timer-controls .start-btn:hover { background: #388e3c; }
    .timer-controls .pause-btn { background: #b8860b; }
    .timer-controls .pause-btn:hover { background: #d4a017; }
    .timer-controls .reset-btn, .stopwatch-controls .reset-btn { background: #8d2e2e; }
    .timer-controls .reset-btn:hover, .stopwatch-controls .reset-btn:hover { background: #a33a3a; }
    .timer-presets { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
    .timer-presets button { padding: 4px 12px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: #ccc; font-size: 0.8rem; cursor: pointer; transition: 0.2s; pointer-events: auto; }
    .timer-presets button:hover { background: rgba(255,255,255,0.08); }
    .timer-input-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .timer-input-row input { width: 60px; padding: 4px 6px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; text-align: center; font-size: 1rem; pointer-events: auto; }
    .timer-input-row label { font-size: 0.8rem; color: #aaa; }
    .timer-input-row button { pointer-events: auto; }
    .stats-content { width: 100%; max-height: 200px; overflow-y: auto; padding: 4px 0; }
    .stats-content .stat-item { display: flex; justify-content: space-between; padding: 4px 8px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
    .stats-content .stat-item span:last-child { font-weight: 600; color: #ffd54f; }

    .notes-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
    .notes-container-inner { position: relative; width: 100%; height: 100%; pointer-events: none; }
    .note-item-free { position: absolute; pointer-events: auto; background: rgba(255,255,255,0.12); border-radius: 12px; padding: 8px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 8px 24px rgba(0,0,0,0.3); display: flex; flex-direction: column; overflow: hidden; backdrop-filter: blur(4px); }
    .note-item-free .note-content { flex: 1; display: flex; flex-direction: column; }
    .note-item-free .note-text { width: 100%; height: 100%; background: transparent; border: none; font-size: 0.85rem; resize: none; outline: none; font-family: inherit; padding: 2px; line-height: 1.4; pointer-events: auto; }
    .note-item-free .note-text:focus { background: rgba(255,255,255,0.05); border-radius: 6px; }
    .note-item-free .note-drag-top { position: absolute; top: 0; left: 0; width: 100%; height: 20px; cursor: grab; pointer-events: auto; }
    .note-item-free .note-drag-bottom { position: absolute; bottom: 0; left: 0; width: 100%; height: 16px; cursor: grab; pointer-events: auto; }
    .note-item-free .note-btn { position: absolute; background: rgba(0,0,0,0.5); border: none; color: #fff; border-radius: 50%; width: 24px; height: 24px; font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.15s; pointer-events: auto; z-index: 10; }
    .note-item-free .note-btn:hover { background: rgba(255,255,255,0.25); }
    .note-item-free .note-btn-delete { top: 2px; right: 2px; }
    .note-item-free .note-btn-edit { top: 2px; }
    @media (max-width: 480px) {
      .note-item-free .note-btn-edit { left: 2px; right: auto; }
    }
    @media (min-width: 481px) {
      .note-item-free .note-btn-edit { right: 54px; left: auto; }
    }
    .note-item-free .note-btn-color { }
    @media (max-width: 480px) {
      .note-item-free .note-btn-color { bottom: 2px; left: 2px; top: auto; right: auto; }
    }
    @media (min-width: 481px) {
      .note-item-free .note-btn-color { top: 2px; right: 28px; left: auto; bottom: auto; }
    }
    .note-item-free .note-btn-resize { bottom: 2px; right: 2px; width: 20px; height: 20px; cursor: nwse-resize; background: rgba(255,255,255,0.1); border-radius: 4px; font-size: 0.7rem; }
    .note-item-free .note-btn-resize::after { content: "↘"; }
    .note-item-free .note-btn.hidden { display: none; }
    .note-item-free.dragging { opacity: 0.9; z-index: 100 !important; transition: none; }
    .add-note-btn { position: fixed; bottom: 30px; right: 30px; width: 48px; height: 48px; border-radius: 50%; background: rgba(255,215,0,0.2); border: 2px solid rgba(255,215,0,0.3); color: #fff; font-size: 1.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 40; backdrop-filter: blur(4px); transition: 0.2s; pointer-events: auto; }
    .add-note-btn:hover { background: rgba(255,215,0,0.3); transform: scale(1.05); }

    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; cursor: pointer; }
    .modal.active { display: flex; }
    .modal-content { background: #1e1e2a; border-radius: 28px; padding: 24px 20px; max-width: 420px; width: 100%; max-height: 80vh; overflow-y: auto; box-shadow: 0 30px 60px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.06); cursor: default; }
    .modal-content h2 { margin-bottom: 16px; font-weight: 500; }
    .settings-group { margin-bottom: 16px; }
    .settings-group label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 4px; }
    .color-picker-wrapper { display: flex; gap: 8px; align-items: center; }
    .color-picker-wrapper input[type="color"] { width: 40px; height: 40px; border: none; border-radius: 10px; background: transparent; cursor: pointer; }
    .color-picker-wrapper input[type="text"] { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 6px 10px; color: #fff; font-family: monospace; }
    .gradient-colors { display: flex; flex-direction: column; gap: 6px; margin-bottom: 6px; }
    .color-input-wrapper { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.03); padding: 4px 6px; border-radius: 10px; }
    .color-input-wrapper input[type="color"] { width: 32px; height: 32px; border: none; background: transparent; cursor: pointer; }
    .color-input-wrapper input[type="text"] { flex: 1; background: transparent; border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; padding: 4px 6px; color: #fff; font-family: monospace; font-size: 0.8rem; }
    .color-move-btn, .remove-gradient-btn { background: rgba(255,255,255,0.05); border: none; color: #aaa; cursor: pointer; padding: 2px 6px; border-radius: 6px; font-size: 0.7rem; }
    .color-move-btn:disabled { opacity: 0.2; cursor: default; }
    .add-gradient-btn { background: rgba(255,255,255,0.05); border: 1px dashed rgba(255,255,255,0.15); color: #aaa; padding: 6px 12px; border-radius: 30px; cursor: pointer; font-size: 0.8rem; margin-top: 4px; }
    .checkbox-container { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
    .checkbox-container input[type="checkbox"] { width: 18px; height: 18px; accent-color: #4caf50; }
    .slider-container { display: flex; align-items: center; gap: 12px; }
    .slider-container input[type="range"] { flex: 1; accent-color: #4caf50; }
    .reset-btn { background: #8d2e2e; border: none; color: #fff; padding: 8px 12px; border-radius: 30px; font-weight: 600; cursor: pointer; margin: 8px 0; }
    .buttons { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
    .buttons button { flex: 1; padding: 10px; border-radius: 30px; border: none; font-weight: 600; cursor: pointer; background: rgba(255,255,255,0.06); color: #fff; min-width: 80px; }
    .buttons .btn-primary { background: #2e7d32; color: #fff; }
    .notification { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e1e2a; padding: 10px 24px; border-radius: 40px; color: #fff; font-weight: 500; box-shadow: 0 10px 30px rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200; border: 1px solid rgba(255,255,255,0.05); }
    .notification.show { opacity: 1; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #555; border-radius: 10px; }
    .year-selector { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin: 4px 0; max-height: 200px; overflow-y: auto; }
    .year-selector button { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 30px; padding: 4px 12px; color: #fff; cursor: pointer; transition: 0.15s; }
    .year-selector button:hover { background: rgba(255,255,255,0.12); }
  </style>
</head>
<body>
<div class="bg-layers">
  <div id="bgLayer"></div>
  <div id="gradientLayer"></div>
  <div id="imageLayer"></div>
</div>

<div class="notes-container" id="notesContainer">
  <div class="notes-container-inner" id="notesInner"></div>
</div>

<button class="add-note-btn" id="addNoteBtn">+</button>

<div class="app-window" id="appWindow">
  <div class="app-container" id="app">
    <div class="drag-arrow" id="dragArrow">⤡</div>

    <div class="top-bar">
      <div class="balance-area" id="balanceArea">
        <span class="icon">🪙</span>
        <span class="value" id="balanceDisplay">0</span>
      </div>
      <div class="music-controls">
        <button id="prevTrackBtn">⏮</button>
        <button id="playPauseBtn">▶</button>
        <button id="nextTrackBtn">⏭</button>
      </div>
      <button class="settings-btn" id="settingsBtn">⚙️</button>
    </div>

    <div class="calendar-wrapper" id="calendarWrapper">
      <div class="calendar-header">
        <button id="prevMonthBtn">◀</button>
        <div class="month-year">
          <span id="monthLabel">Январь</span>
          <span id="yearLabel">2025</span>
        </div>
        <button id="nextMonthBtn">▶</button>
      </div>
      <div class="weekday-names" id="weekdayNames"></div>
      <div class="week-days" id="weekContainer"></div>
      <div class="month-grid" id="monthContainer"></div>
    </div>

    <div class="tasks-panel" id="tasksPanel">
      <div class="tasks-header">
        <span id="dayLabel">Сегодня</span>
        <span id="dayPointsLabel">+0</span>
      </div>
      <ul class="tasks-list" id="tasksList"></ul>
      <button class="btn-done" id="doneBtn">✅ Завершено</button>
    </div>

    <div class="timer-row">
      <button id="timerToggleBtn">⏱️ Таймер</button>
      <button id="statsToggleBtn">📊 Статистика</button>
      <button id="stopwatchToggleBtn">⏱️ Секундомер</button>
    </div>

    <div class="timer-panel" id="timerPanel">
      <div class="timer-display" id="timerDisplay">00:00</div>
      <div class="timer-input-row">
        <label>Минуты:</label><input type="number" id="timerMinutes" min="0" max="999" value="25">
        <label>Секунды:</label><input type="number" id="timerSeconds" min="0" max="59" value="0">
        <button id="timerSetBtn">Установить</button>
      </div>
      <div class="timer-presets" id="timerPresets"></div>
      <div class="timer-controls">
        <button class="start-btn" id="timerStartBtn">▶ Старт</button>
        <button class="pause-btn" id="timerPauseBtn">⏸ Пауза</button>
        <button class="reset-btn" id="timerResetBtn">⏹ Сброс</button>
      </div>
    </div>

    <div class="stopwatch-panel" id="stopwatchPanel">
      <div class="stopwatch-display" id="stopwatchDisplay">00:00:00.00</div>
      <div class="stopwatch-controls">
        <button id="stopwatchStartBtn">▶ Старт</button>
        <button id="stopwatchStopBtn">⏹ Стоп</button>
        <button id="stopwatchResetBtn">⟳ Сброс</button>
      </div>
    </div>

    <div class="stats-panel" id="statsPanel">
      <div style="display:flex; justify-content:space-between; width:100%;">
        <span style="font-weight:600;">📊 Статистика</span>
      </div>
      <div class="stats-content" id="statsContent"></div>
    </div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<div class="notification" id="notification"></div>

<script>
  // ===== ДАННЫЕ =====
  let data = {
    tasks: [], completed: [], store: [], tempTasks: [], notes: [],
    balance: 0, piggyBalance: 0,
    settings: {
      bgColor: '#2b2b2b', textColor: '#ffffff',
      gradientColors: ['#2b2b2b', '#1a1a2e'], bgImage: null,
      musicVolume: 100, soundEffects: true, customMusic: []
    }
  };

  // ===== КОНСТАНТЫ =====
  const WEEK_TASKS = [
    { day: 1, tasks: ['Жим штанги лежа', 'Жим гантелей лежа (5кг)', 'Пуловер с гантелью', 'Французский жим лежа', 'Разгибание рук с гантелью'] },
    { day: 2, tasks: ['Тяга штанги в наклоне', 'Тяга гантели в наклоне', 'Шраги с гантелями', 'Подъем штанги на бицепс', 'Подъем гантелей на бицепс (молотки)'] },
    { day: 3, tasks: ['Прогулка 40-60 мин', 'Легкая растяжка', 'Велосипед (опционально)'] },
    { day: 4, tasks: ['Приседания со штангой', 'Выпады с гантелями (5кг)', 'Становая тяга', 'Жим гантелей сидя', 'Махи гантелями в стороны', 'Тяга штанги к подбородку'] },
    { day: 5, tasks: ['Прогулка 30-40 мин', 'Растяжка'] },
    { day: 6, tasks: ['Ягодичный мостик', 'Приседания плие', 'Махи ногами назад', 'Скручивания с гантелью', 'V-складка', 'Прогулка фермера'] },
    { day: 7, tasks: ['Отдых'] }
  ];
  const WEEKDAY_NAMES = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];

  // ===== СОСТОЯНИЕ =====
  let currentDate = new Date();
  let selectedDate = new Date();
  let currentMonth = currentDate.getMonth();
  let currentYear = currentDate.getFullYear();
  let monthOpen = false;
  let taskCheckState = {};
  let currentTasksForDay = [];
  let timerInterval = null, stopwatchInterval = null;
  let timerSecondsLeft = 0, timerRunning = false, timerPaused = false;
  let stopwatchMs = 0, stopwatchRunning = false;
  let timerPresets = [];
  let musicAudio = null, trackIndex = 0, isPlaying = false;
  let musicFiles = ['background1.mp3','background2.mp3','background3.mp3','background4.mp3','background5.mp3'];
  let isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  let windowScale = 1;
  let lastTouchDist = 0;
  let scaleTransform = '';

  // ===== РАБОТА С ФАЙЛАМИ =====
  let fileHandle = null;
  let fileLoaded = false;

  async function saveDataToFile() {
    try {
      const json = JSON.stringify(data, null, 2);
      
      // Если есть fileHandle, используем его для сохранения
      if (fileHandle) {
        try {
          const writable = await fileHandle.createWritable();
          await writable.write(json);
          await writable.close();
          showNotification('✅ Данные сохранены в файл!');
          return;
        } catch (e) {
          // Если не удалось записать через fileHandle, используем загрузку
          console.warn('Не удалось сохранить через fileHandle, используем download');
        }
      }
      
      // Запасной вариант: скачивание файла
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'savegame_gum.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showNotification('✅ Файл сохранен! (скачан)');
    } catch (e) {
      showNotification('❌ Ошибка сохранения: ' + e.message);
    }
  }

  async function loadDataFromFile() {
    try {
      // Пытаемся открыть файл через File System Access API
      if ('showOpenFilePicker' in window) {
        try {
          const [handle] = await window.showOpenFilePicker({
            types: [{
              description: 'JSON файлы',
              accept: { 'application/json': ['.json'] }
            }],
            multiple: false
          });
          fileHandle = handle;
          const file = await handle.getFile();
          const text = await file.text();
          const parsed = JSON.parse(text);
          data = parsed;
          fileLoaded = true;
          // Инициализируем недостающие поля
          if (!data.tempTasks) data.tempTasks = [];
          if (!data.notes) data.notes = [];
          if (!data.piggyBalance) data.piggyBalance = 0;
          if (!data.settings) data.settings = { bgColor: '#2b2b2b', textColor: '#ffffff', gradientColors: ['#2b2b2b','#1a1a2e'], bgImage: null, musicVolume: 100, soundEffects: true, customMusic: [] };
          if (!data.settings.gradientColors) data.settings.gradientColors = ['#2b2b2b','#1a1a2e'];
          if (!data.settings.musicVolume) data.settings.musicVolume = 100;
          if (!data.settings.customMusic) data.settings.customMusic = [];
          applySettings();
          renderCalendar();
          renderDayTasks(selectedDate);
          updateDoneButton();
          updateBalance();
          renderNotes();
          showNotification('✅ Данные загружены из файла!');
          return;
        } catch (e) {
          if (e.name !== 'AbortError') {
            console.warn('File System API не сработал:', e);
          }
        }
      }
      
      // Запасной вариант: через input type="file"
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const text = await file.text();
        const parsed = JSON.parse(text);
        data = parsed;
        fileLoaded = true;
        if (!data.tempTasks) data.tempTasks = [];
        if (!data.notes) data.notes = [];
        if (!data.piggyBalance) data.piggyBalance = 0;
        if (!data.settings) data.settings = { bgColor: '#2b2b2b', textColor: '#ffffff', gradientColors: ['#2b2b2b','#1a1a2e'], bgImage: null, musicVolume: 100, soundEffects: true, customMusic: [] };
        if (!data.settings.gradientColors) data.settings.gradientColors = ['#2b2b2b','#1a1a2e'];
        if (!data.settings.musicVolume) data.settings.musicVolume = 100;
        if (!data.settings.customMusic) data.settings.customMusic = [];
        applySettings();
        renderCalendar();
        renderDayTasks(selectedDate);
        updateDoneButton();
        updateBalance();
        renderNotes();
        showNotification('✅ Данные загружены из файла!');
      };
      input.click();
    } catch (e) {
      showNotification('❌ Ошибка загрузки: ' + e.message);
    }
  }

  // ===== ИНИЦИАЛИЗАЦИЯ =====
  function init() {
    // Пытаемся загрузить из localStorage для совместимости, но потом предлагаем загрузить из файла
    loadDataFromLocalStorage();
    
    initMusic();
    renderCalendar();
    renderDayTasks(selectedDate);
    updateDoneButton();
    applySettings();
    updateBalance();
    loadTimerPresets();
    renderNotes();
    
    document.getElementById('settingsBtn').addEventListener('click', openSettings);
    document.getElementById('doneBtn').addEventListener('click', completeDay);
    document.getElementById('playPauseBtn').addEventListener('click', toggleMusic);
    document.getElementById('prevTrackBtn').addEventListener('click', () => changeTrack(-1));
    document.getElementById('nextTrackBtn').addEventListener('click', () => changeTrack(1));
    document.getElementById('prevMonthBtn').addEventListener('click', () => changeMonth(-1));
    document.getElementById('nextMonthBtn').addEventListener('click', () => changeMonth(1));
    document.getElementById('yearLabel').addEventListener('click', showYearPicker);
    document.getElementById('timerToggleBtn').addEventListener('click', toggleTimerPanel);
    document.getElementById('timerSetBtn').addEventListener('click', setTimerFromInput);
    document.getElementById('timerStartBtn').addEventListener('click', startTimer);
    document.getElementById('timerPauseBtn').addEventListener('click', pauseTimer);
    document.getElementById('timerResetBtn').addEventListener('click', resetTimer);
    document.getElementById('stopwatchToggleBtn').addEventListener('click', toggleStopwatchPanel);
    document.getElementById('stopwatchStartBtn').addEventListener('click', startStopwatch);
    document.getElementById('stopwatchStopBtn').addEventListener('click', stopStopwatch);
    document.getElementById('stopwatchResetBtn').addEventListener('click', resetStopwatch);
    document.getElementById('statsToggleBtn').addEventListener('click', toggleStatsPanel);
    document.getElementById('addNoteBtn').addEventListener('click', addNote);
    
    initWindowDrag();
    initPullDown();
    initPinchZoom();
    
    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
    
    // Добавляем кнопки для работы с файлами в настройки
    // Добавляем опцию загрузки из файла при первом запуске
    if (!localStorage.getItem('taskManagerData') && !fileLoaded) {
      setTimeout(() => {
        if (confirm('Хотите загрузить сохранение из файла savegame_gum.json?')) {
          loadDataFromFile();
        }
      }, 500);
    }
  }

  function loadDataFromLocalStorage() {
    try {
      const saved = localStorage.getItem('taskManagerData');
      if (saved) {
        const parsed = JSON.parse(saved);
        data = parsed;
        if (!data.tempTasks) data.tempTasks = [];
        if (!data.notes) data.notes = [];
        if (!data.piggyBalance) data.piggyBalance = 0;
        if (!data.settings) data.settings = { bgColor: '#2b2b2b', textColor: '#ffffff', gradientColors: ['#2b2b2b','#1a1a2e'], bgImage: null, musicVolume: 100, soundEffects: true, customMusic: [] };
        if (!data.settings.gradientColors) data.settings.gradientColors = ['#2b2b2b','#1a1a2e'];
        if (!data.settings.musicVolume) data.settings.musicVolume = 100;
        if (!data.settings.customMusic) data.settings.customMusic = [];
      }
    } catch(e) {}
  }

  // ===== ПЕРЕТАСКИВАНИЕ ОКНА =====
  function initWindowDrag() {
    const windowEl = document.getElementById('appWindow');
    const arrow = document.getElementById('dragArrow');
    let isDragging = false;
    let startX = 0, startY = 0;
    let origLeft = 0, origTop = 0;
    let rafId = null;

    function getPos(e) {
      if (e.touches && e.touches.length > 0) {
        return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }
      return { x: e.clientX, y: e.clientY };
    }

    function onStart(e) {
      if (!e.target.closest('.drag-arrow')) return;
      isDragging = true;
      const pos = getPos(e);
      startX = pos.x;
      startY = pos.y;
      const rect = windowEl.getBoundingClientRect();
      origLeft = rect.left;
      origTop = rect.top;
      windowEl.classList.add('dragging');
      if (e.preventDefault) e.preventDefault();
    }

    function onMove(e) {
      if (!isDragging) return;
      if (rafId) cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(() => {
        const pos = getPos(e);
        const dx = pos.x - startX;
        const dy = pos.y - startY;
        const newLeft = origLeft + dx;
        const newTop = origTop + dy;
        windowEl.style.left = newLeft + 'px';
        windowEl.style.top = newTop + 'px';
        windowEl.style.transform = scaleTransform || 'none';
        rafId = null;
      });
      if (e.preventDefault) e.preventDefault();
    }

    function onEnd(e) {
      if (isDragging) {
        isDragging = false;
        windowEl.classList.remove('dragging');
        if (rafId) {
          cancelAnimationFrame(rafId);
          rafId = null;
        }
      }
    }

    arrow.addEventListener('mousedown', onStart);
    arrow.addEventListener('touchstart', onStart, { passive: false });
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onEnd, { passive: false });
  }

  // ===== ВЫТЯГИВАНИЕ КАЛЕНДАРЯ =====
  function initPullDown() {
    const wrapper = document.getElementById('calendarWrapper');
    let startY = 0, isPulling = false;
    
    wrapper.addEventListener('touchstart', (e) => {
      const target = e.target.closest('.week-day-cell');
      if (!target) return;
      startY = e.touches[0].clientY;
      isPulling = true;
    }, { passive: true });
    
    wrapper.addEventListener('touchmove', (e) => {
      if (!isPulling) return;
      const diff = startY - e.touches[0].clientY;
      if (diff < -30 && !monthOpen) {
        monthOpen = true;
        document.getElementById('monthContainer').classList.add('open');
        document.getElementById('weekContainer').classList.add('hidden');
        document.getElementById('weekdayNames').classList.add('hidden');
        isPulling = false;
      } else if (diff > 30 && monthOpen) {
        closeMonth();
        isPulling = false;
      }
    }, { passive: true });
    
    wrapper.addEventListener('touchend', () => { isPulling = false; }, { passive: true });
    
    let mouseDownY = 0, mousePulling = false;
    wrapper.addEventListener('mousedown', (e) => {
      const target = e.target.closest('.week-day-cell');
      if (!target) return;
      mouseDownY = e.clientY;
      mousePulling = true;
    });
    
    wrapper.addEventListener('mousemove', (e) => {
      if (!mousePulling) return;
      const diff = mouseDownY - e.clientY;
      if (diff < -30 && !monthOpen) {
        monthOpen = true;
        document.getElementById('monthContainer').classList.add('open');
        document.getElementById('weekContainer').classList.add('hidden');
        document.getElementById('weekdayNames').classList.add('hidden');
        mousePulling = false;
      } else if (diff > 30 && monthOpen) {
        closeMonth();
        mousePulling = false;
      }
    });
    
    wrapper.addEventListener('mouseup', () => { mousePulling = false; });
  }

  function closeMonth() {
    monthOpen = false;
    document.getElementById('monthContainer').classList.remove('open');
    document.getElementById('weekContainer').classList.remove('hidden');
    document.getElementById('weekdayNames').classList.remove('hidden');
  }

  // ===== МАСШТАБИРОВАНИЕ =====
  function initPinchZoom() {
    const windowEl = document.getElementById('appWindow');
    windowEl.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        lastTouchDist = Math.sqrt(dx*dx + dy*dy);
      }
    }, { passive: true });
    
    windowEl.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const delta = dist - lastTouchDist;
        if (Math.abs(delta) > 5) {
          let newScale = windowScale + delta * 0.005;
          newScale = Math.max(0.6, Math.min(1.2, newScale));
          windowScale = newScale;
          scaleTransform = `scale(${windowScale})`;
          windowEl.style.transform = scaleTransform;
          windowEl.style.transformOrigin = 'center center';
          lastTouchDist = dist;
        }
      }
    }, { passive: true });
    
    windowEl.addEventListener('touchend', (e) => {
      if (e.touches.length < 2) lastTouchDist = 0;
    }, { passive: true });
  }

  // ===== ЕДИНАЯ ФУНКЦИЯ СТАТУСА ДНЯ =====
  function getDayStatus(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    const key = `${year}-${month}-${day}`;
    
    if (data.completed.includes(key)) return 'completed';
    
    const today = new Date();
    const todayYear = today.getFullYear();
    const todayMonth = String(today.getMonth() + 1).padStart(2, '0');
    const todayDay = String(today.getDate()).padStart(2, '0');
    const todayKey = `${todayYear}-${todayMonth}-${todayDay}`;
    
    if (key < todayKey && !data.completed.includes(key)) return 'missed';
    return 'normal';
  }

  // ===== КАЛЕНДАРЬ =====
  function renderCalendar() {
    const month = currentMonth, year = currentYear;
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const today = new Date();
    const todayDate = today.getDate();
    const todayMonth = today.getMonth();
    const todayYear = today.getFullYear();

    document.getElementById('monthLabel').textContent = new Date(year, month).toLocaleString('ru', { month: 'long' });
    document.getElementById('yearLabel').textContent = year;

    const namesContainer = document.getElementById('weekdayNames');
    namesContainer.innerHTML = WEEKDAY_NAMES.map(n => `<span>${n}</span>`).join('');
    namesContainer.classList.remove('hidden');

    const weekContainer = document.getElementById('weekContainer');
    weekContainer.innerHTML = '';
    const startOfWeek = new Date(selectedDate);
    const dayOfWeek = startOfWeek.getDay();
    const diffToMonday = (dayOfWeek === 0 ? 6 : dayOfWeek - 1);
    startOfWeek.setDate(startOfWeek.getDate() - diffToMonday);
    
    for (let i = 0; i < 7; i++) {
      const d = new Date(startOfWeek);
      d.setDate(d.getDate() + i);
      const cell = document.createElement('div');
      cell.className = 'week-day-cell';
      const isToday = (d.getDate() === todayDate && d.getMonth() === todayMonth && d.getFullYear() === todayYear);
      if (isToday) cell.classList.add('today');
      const status = getDayStatus(d);
      if (status === 'completed') cell.classList.add('completed');
      else if (status === 'missed') cell.classList.add('missed');
      cell.dataset.date = d.toISOString().split('T')[0];
      cell.innerHTML = `<span class="day-num">${d.getDate()}</span>`;
      cell.addEventListener('click', (e) => {
        e.stopPropagation();
        const dt = new Date(d);
        selectedDate = dt;
        renderDayTasks(dt);
        highlightWeek();
        closeMonth();
      });
      weekContainer.appendChild(cell);
    }

    const monthContainer = document.getElementById('monthContainer');
    monthContainer.innerHTML = '';
    const firstDayIndex = firstDay === 0 ? 6 : firstDay - 1;
    const totalCells = Math.ceil((firstDayIndex + daysInMonth) / 7) * 7;
    
    for (let i = 0; i < totalCells; i++) {
      const cell = document.createElement('div');
      cell.className = 'week-day-cell';
      const dayNum = i - firstDayIndex + 1;
      if (dayNum >= 1 && dayNum <= daysInMonth) {
        cell.textContent = dayNum;
        const d = new Date(year, month, dayNum);
        const status = getDayStatus(d);
        if (status === 'completed') cell.classList.add('completed');
        else if (status === 'missed') cell.classList.add('missed');
        const isToday = (d.getDate() === todayDate && d.getMonth() === todayMonth && d.getFullYear() === todayYear);
        if (isToday) cell.classList.add('today');
        cell.dataset.date = d.toISOString().split('T')[0];
        cell.addEventListener('click', (e) => {
          e.stopPropagation();
          const dt = new Date(year, month, dayNum);
          selectedDate = dt;
          renderDayTasks(dt);
          highlightWeek();
          closeMonth();
        });
      } else {
        cell.classList.add('empty');
        cell.textContent = '';
      }
      monthContainer.appendChild(cell);
    }
    highlightWeek();
  }

  function changeMonth(delta) {
    currentMonth += delta;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    renderCalendar();
  }

  function showYearPicker() {
    const years = [];
    for (let y = currentYear - 20; y <= currentYear + 20; y++) years.push(y);
    const modal = document.getElementById('modal');
    const content = document.getElementById('modalContent');
    content.innerHTML = `
      <h2>Выберите год</h2>
      <div class="year-selector">${years.map(y => `<button onclick="setYear(${y})">${y}</button>`).join('')}</div>
      <div class="buttons"><button onclick="closeModal()">Закрыть</button></div>
    `;
    modal.classList.add('active');
  }

  function setYear(y) {
    currentYear = y;
    renderCalendar();
    closeModal();
  }

  function highlightWeek() {
    const cells = document.querySelectorAll('.week-day-cell');
    const sel = selectedDate.toISOString().split('T')[0];
    cells.forEach(c => {
      c.classList.remove('selected');
      if (c.dataset.date === sel) c.classList.add('selected');
    });
  }

  // ===== ЗАДАНИЯ ДНЯ =====
  function renderDayTasks(date) {
    const dayOfWeek = date.getDay();
    const dayIndex = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
    const dayData = WEEK_TASKS[dayIndex] || { tasks: ['Отдых'] };
    const tasks = dayData.tasks.map((t, idx) => ({ 
      id: `${date.toISOString().split('T')[0]}_${idx}`, 
      text: t, 
      points: t.toLowerCase().includes('отдых') ? 12 : 25 
    }));
    currentTasksForDay = tasks;
    const list = document.getElementById('tasksList');
    list.innerHTML = '';
    const dayLabel = document.getElementById('dayLabel');
    dayLabel.textContent = date.toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'short' });

    const key = date.toISOString().split('T')[0];
    const todayKey = new Date().toISOString().split('T')[0];
    const isCompleted = data.completed.includes(key);
    const isMissed = key < todayKey && !isCompleted;

    const doneBtn = document.getElementById('doneBtn');
    if (isCompleted || isMissed) {
      doneBtn.classList.add('hidden');
      doneBtn.classList.remove('active');
      doneBtn.disabled = true;
    } else {
      doneBtn.classList.remove('hidden');
    }

    if (isCompleted) {
      list.innerHTML = '<div style="text-align:center;padding:10px;color:#81c784;">✅ Завершено</div>';
      document.getElementById('dayPointsLabel').textContent = '';
      return;
    }
    if (isMissed) {
      list.innerHTML = '<div style="text-align:center;padding:10px;color:#ef9a9a;">❌ Пропущено</div>';
      document.getElementById('dayPointsLabel').textContent = '';
      return;
    }

    const stored = data.tempTasks.find(t => t.date === key);
    const doneIds = stored ? stored.doneIds : [];
    taskCheckState = {};
    tasks.forEach(t => { taskCheckState[t.id] = doneIds.includes(t.id); });

    let totalPoints = 0;
    tasks.forEach(t => {
      const li = document.createElement('li');
      li.className = 'task-item';
      if (taskCheckState[t.id]) li.classList.add('done');
      const cb = document.createElement('span');
      cb.className = 'checkbox' + (taskCheckState[t.id] ? ' done' : '');
      cb.textContent = taskCheckState[t.id] ? '✓' : '';
      cb.addEventListener('click', (e) => {
        e.stopPropagation();
        if (key !== todayKey) return;
        toggleTask(t.id, date);
      });
      const txt = document.createElement('span');
      txt.className = 'task-text';
      txt.textContent = t.text;
      const pts = document.createElement('span');
      pts.className = 'task-points';
      pts.textContent = `+${t.points}`;
      li.appendChild(cb); li.appendChild(txt); li.appendChild(pts);
      list.appendChild(li);
      if (taskCheckState[t.id]) totalPoints += t.points;
    });
    document.getElementById('dayPointsLabel').textContent = `+${totalPoints}`;
    updateDoneButton();
  }

  function toggleTask(taskId, date) {
    const key = date.toISOString().split('T')[0];
    taskCheckState[taskId] = !taskCheckState[taskId];
    if (!data.tempTasks) data.tempTasks = [];
    let entry = data.tempTasks.find(t => t.date === key);
    if (!entry) { entry = { date: key, doneIds: [] }; data.tempTasks.push(entry); }
    if (taskCheckState[taskId]) {
      if (!entry.doneIds.includes(taskId)) entry.doneIds.push(taskId);
    } else {
      entry.doneIds = entry.doneIds.filter(id => id !== taskId);
    }
    saveDataToFile();
    renderDayTasks(date);
    updateDoneButton();
  }

  function updateDoneButton() {
    const btn = document.getElementById('doneBtn');
    const todayKey = new Date().toISOString().split('T')[0];
    const isToday = selectedDate.toISOString().split('T')[0] === todayKey;
    const allChecked = currentTasksForDay.every(t => taskCheckState[t.id] === true);
    if (allChecked && currentTasksForDay.length > 0 && isToday && !data.completed.includes(todayKey)) {
      btn.classList.add('active');
      btn.disabled = false;
    } else {
      btn.classList.remove('active');
      btn.disabled = true;
    }
  }

  function completeDay() {
    const todayKey = new Date().toISOString().split('T')[0];
    if (data.completed.includes(todayKey)) { showNotification('Уже завершено'); return; }
    const allChecked = currentTasksForDay.every(t => taskCheckState[t.id] === true);
    if (!allChecked) { showNotification('Выполните все задания!'); return; }
    let points = 0;
    currentTasksForDay.forEach(t => { if (taskCheckState[t.id]) points += t.points; });
    data.balance += points;
    data.completed.push(todayKey);
    data.tempTasks = data.tempTasks.filter(t => t.date !== todayKey);
    saveDataToFile();
    updateBalance();
    renderCalendar();
    renderDayTasks(selectedDate);
    updateDoneButton();
    showNotification(`✅ Завершено! +${points} баллов`);
  }

    document.getElementById('balanceDisplay').textContent = data.balance;

  function initMusic() {

  function toggleMusic() {
    if (!musicAudio) return;

      musicAudio.pause();

      isPlaying = false;

      musicAudio.onended = () => { changeTrack(1); };
    }

      musicAudio.play().catch(() => showNotification('Файл не найден'));

  }

  // ===== ТАЙМЕР =====
  function toggleTimerPanel() {
    const panel = document.getElementById('timerPanel');
    panel.classList.toggle('active');
    if (panel.classList.contains('active')) {
      document.getElementById('stopwatchPanel').classList.remove('active');
      document.getElementById('statsPanel').classList.remove('active');
      loadTimerPresets();
    }
  }
  function setTimerFromInput() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; timerRunning = false; }
    const mins = parseInt(document.getElementById('timerMinutes').value) || 0;
    const secs = parseInt(document.getElementById('timerSeconds').value) || 0;
    timerSecondsLeft = mins * 60 + secs;
    updateTimerDisplay();
    const preset = `${mins}:${secs.toString().padStart(2,'0')}`;
    if (!timerPresets.includes(preset) && timerSecondsLeft > 0) {
      timerPresets.unshift(preset);
      if (timerPresets.length > 5) timerPresets.pop();
      saveTimerPresets();
      loadTimerPresets();
    }
    showNotification(`⏱️ Установлено ${preset}`);
  }
  function startTimer() {
    if (timerSecondsLeft <= 0) { showNotification('Установите время'); return; }
    if (timerRunning) return;
    if (timerPaused) { timerPaused = false; timerRunning = true; return; }
    timerRunning = true;
    timerPaused = false;
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      if (timerSecondsLeft <= 0) {
        clearInterval(timerInterval);
        timerInterval = null;
        timerRunning = false;
        showNotification('⏰ Время вышло!');
        return;
      }
      timerSecondsLeft--;
      updateTimerDisplay();
    }, 1000);
  }
  function pauseTimer() {
    if (timerRunning && !timerPaused) {
      timerPaused = true;
      timerRunning = false;
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    }
  }
  function resetTimer() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    timerRunning = false; timerPaused = false;
    setTimerFromInput();
  }
  function updateTimerDisplay() {
    const mins = Math.floor(timerSecondsLeft / 60);
    const secs = timerSecondsLeft % 60;
    document.getElementById('timerDisplay').textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
  }
  function loadTimerPresets() {
    try { const saved = localStorage.getItem('timerPresets'); if (saved) timerPresets = JSON.parse(saved); } catch(e) {}
    if (!timerPresets || timerPresets.length === 0) timerPresets = ['25:00', '05:00', '10:00', '15:00', '30:00'];
    renderTimerPresets();
  }
  function saveTimerPresets() { try { localStorage.setItem('timerPresets', JSON.stringify(timerPresets)); } catch(e) {} }
  function renderTimerPresets() {
    const container = document.getElementById('timerPresets');
    container.innerHTML = timerPresets.map(p => `<button onclick="setTimerPreset('${p}')">${p}</button>`).join('');
  }
  function setTimerPreset(preset) {
    const parts = preset.split(':').map(Number);
    if (parts.length === 2) {
      document.getElementById('timerMinutes').value = parts[0];
      document.getElementById('timerSeconds').value = parts[1];
      setTimerFromInput();
    }
  }

  // ===== СЕКУНДОМЕР =====
  function toggleStopwatchPanel() {
    const panel = document.getElementById('stopwatchPanel');
    panel.classList.toggle('active');
    if (panel.classList.contains('active')) {
      document.getElementById('timerPanel').classList.remove('active');
      document.getElementById('statsPanel').classList.remove('active');
    }
  }
  function startStopwatch() {
    if (stopwatchRunning) return;
    stopwatchRunning = true;
    const startTime = Date.now() - stopwatchMs;
    if (stopwatchInterval) clearInterval(stopwatchInterval);
    stopwatchInterval = setInterval(() => {
      stopwatchMs = Date.now() - startTime;
      updateStopwatchDisplay();
    }, 10);
  }
  function stopStopwatch() {
    stopwatchRunning = false;
    if (stopwatchInterval) { clearInterval(stopwatchInterval); stopwatchInterval = null; }
  }
  function resetStopwatch() {
    stopwatchRunning = false;
    if (stopwatchInterval) { clearInterval(stopwatchInterval); stopwatchInterval = null; }
    stopwatchMs = 0;
    updateStopwatchDisplay();
  }
  function updateStopwatchDisplay() {
    const ms = stopwatchMs % 1000;
    const totalSec = Math.floor(stopwatchMs / 1000);
    const secs = totalSec % 60;
    const mins = Math.floor(totalSec / 60) % 60;
    const hours = Math.floor(totalSec / 3600);
    document.getElementById('stopwatchDisplay').textContent = 
      `${hours.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}.${Math.floor(ms/10).toString().padStart(2,'0')}`;
  }

  function toggleStatsPanel() {
    const panel = document.getElementById('statsPanel');
    panel.classList.toggle('active');

      document.getElementById('stopwatchPanel').classList.remove('active');

  function updateStats() {
    const now = new Date();
    const weekAgo = new Date(now); weekAgo.setDate(now.getDate() - 7);
    const monthAgo = new Date(now); monthAgo.setMonth(now.getMonth() - 1);
    const yearAgo = new Date(now); yearAgo.setFullYear(now.getFullYear() - 1);
    const completed = data.completed || [];
    const weekCount = completed.filter(d => new Date(d) >= weekAgo).length;
    const monthCount = completed.filter(d => new Date(d) >= monthAgo).length;
    const yearCount = completed.filter(d => new Date(d) >= yearAgo).length;
    document.getElementById('statsContent').innerHTML = `
      <div class="stat-item"><span>Завершено за неделю</span><span>${weekCount}</span></div>
      <div class="stat-item"><span>Завершено за месяц</span><span>${monthCount}</span></div>
      <div class="stat-item"><span>Завершено за год</span><span>${yearCount}</span></div>
      <div class="stat-item"><span>Всего завершено</span><span>${completed.length}</span></div>
      <div class="stat-item"><span>Баланс</span><span>${data.balance}</span></div>
    `;
  }

  // ===== ЗАМЕТКИ =====
  function renderNotes() {
    const container = document.getElementById('notesInner');
    container.innerHTML = '';
    data.notes.forEach((note, index) => {
      const div = document.createElement('div');
      div.className = 'note-item-free';
      div.dataset.index = index;
      div.style.left = (note.x || 10 + index * 15) + 'px';
      div.style.top = (note.y || 10 + index * 20) + 'px';
      div.style.width = (note.width || 180) + 'px';
      div.style.height = (note.height || 120) + 'px';
      div.style.zIndex = note.zIndex || 5 + index;
      const noteColor = note.color || 'rgba(255,255,255,0.12)';
      div.style.background = noteColor;
      div.innerHTML = `
        <button class="note-btn note-btn-delete" onclick="deleteNote(${index})">✕</button>
        <button class="note-btn note-btn-edit ${isMobile ? '' : 'hidden'}" onclick="editNoteTextMobile(${index})">✎</button>
        <button class="note-btn note-btn-color" onclick="changeNoteColor(${index})">⚙️</button>
        <button class="note-btn note-btn-resize"></button>
        <div class="note-drag-top"></div>
        <div class="note-drag-bottom"></div>
        <div class="note-content">
          <textarea class="note-text" oninput="updateNoteText(${index}, this.value)" 
                    style="min-height: ${(note.height || 120) - 40}px;">${note.text || ''}</textarea>
        </div>
      `;
      const textarea = div.querySelector('.note-text');
      if (textarea) {
        if (!isMobile) {
          textarea.addEventListener('focus', function(e) { this.select(); });
        } else {
          textarea.style.pointerEvents = 'auto';
          textarea.style.userSelect = 'none';
          textarea.style.webkitUserSelect = 'none';
          textarea.style.cursor = 'default';
          textarea.style.touchAction = 'pan-y';
          textarea.addEventListener('focus', function(e) { this.blur(); });
        }
      }
      let isDragging2 = false, startX, startY, origX, origY;
      const startDrag = function(e) {
        const target = e.target;
        if (!target.classList.contains('note-drag-top') && !target.classList.contains('note-drag-bottom')) return;
        if (target.closest('.note-btn')) return;
        const maxZ = Math.max(20, ...data.notes.map(n => n.zIndex || 5));
        data.notes[index].zIndex = maxZ + 1;
        div.style.zIndex = maxZ + 1;
        isDragging2 = true;
        const clientX = e.clientX || e.touches?.[0]?.clientX || 0;
        const clientY = e.clientY || e.touches?.[0]?.clientY || 0;
        startX = clientX; startY = clientY;
        origX = parseInt(div.style.left); origY = parseInt(div.style.top);
        div.classList.add('dragging');
        e.preventDefault?.();
      };
      const moveDrag = function(e) {
        if (!isDragging2) return;
        const clientX = e.clientX || e.touches?.[0]?.clientX || 0;
        const clientY = e.clientY || e.touches?.[0]?.clientY || 0;
        const dx = clientX - startX, dy = clientY - startY;
        const newX = Math.max(0, origX + dx);
        const newY = Math.max(0, origY + dy);
        div.style.left = newX + 'px'; div.style.top = newY + 'px';
        if (index < data.notes.length) { data.notes[index].x = newX; data.notes[index].y = newY; }
      };
      const endDrag = function() {
        if (isDragging2) { isDragging2 = false; div.classList.remove('dragging'); saveDataToFile(); }
      };
      const dragTop = div.querySelector('.note-drag-top');
      const dragBottom = div.querySelector('.note-drag-bottom');
      if (dragTop) { dragTop.addEventListener('mousedown', startDrag); dragTop.addEventListener('touchstart', startDrag, { passive: false }); }
      if (dragBottom) { dragBottom.addEventListener('mousedown', startDrag); dragBottom.addEventListener('touchstart', startDrag, { passive: false }); }
      document.addEventListener('mousemove', moveDrag); document.addEventListener('mouseup', endDrag);
      document.addEventListener('touchmove', moveDrag, { passive: false }); document.addEventListener('touchend', endDrag, { passive: false });
      const resizeHandle = div.querySelector('.note-btn-resize');
      if (resizeHandle) {
        let isResizing = false, startResizeX, startResizeY, startWidth, startHeight;
        const startResize = function(e) {
          e.preventDefault(); e.stopPropagation();
          isResizing = true;
          const clientX = e.clientX || e.touches?.[0]?.clientX || 0;
          const clientY = e.clientY || e.touches?.[0]?.clientY || 0;
          startResizeX = clientX; startResizeY = clientY;
          startWidth = parseInt(div.style.width) || 180; startHeight = parseInt(div.style.height) || 120;
          div.classList.add('dragging');
          document.body.style.userSelect = 'none';
        };
        const moveResize = function(e) {
          if (!isResizing) return;
          const clientX = e.clientX || e.touches?.[0]?.clientX || 0;
          const clientY = e.clientY || e.touches?.[0]?.clientY || 0;
          const dx = clientX - startResizeX, dy = clientY - startResizeY;
          const newWidth = Math.max(100, startWidth + dx);
          const newHeight = Math.max(50, startHeight + dy);
          div.style.width = newWidth + 'px'; div.style.height = newHeight + 'px';
          if (index < data.notes.length) { data.notes[index].width = newWidth; data.notes[index].height = newHeight; }
          const textarea2 = div.querySelector('.note-text');
          if (textarea2) { textarea2.style.height = '100%'; textarea2.style.width = '100%'; }
        };
        const endResize = function() {
          if (isResizing) { isResizing = false; div.classList.remove('dragging'); document.body.style.userSelect = ''; saveDataToFile(); }
        };
        resizeHandle.addEventListener('mousedown', startResize);
        document.addEventListener('mousemove', moveResize); document.addEventListener('mouseup', endResize);
        resizeHandle.addEventListener('touchstart', startResize, { passive: false });
        document.addEventListener('touchmove', moveResize, { passive: false }); document.addEventListener('touchend', endResize, { passive: false });
      }
      container.appendChild(div);
    });
  }

    const maxY = Math.max(0, ...data.notes.map(n => n.y || 0));
    const maxZ = Math.max(5, ...data.notes.map(n => n.zIndex || 5));

  function importMusic(input) {
    const files = input.files;
    if (!files.length) return;
    for (let f of files) {
      if (f.type === 'audio/mp3' || f.name.endsWith('.mp3')) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const dataUrl = e.target.result;
          if (!data.settings.customMusic) data.settings.customMusic = [];
          data.settings.customMusic.push(dataUrl);
          musicFiles.push(dataUrl);
          saveDataToFile();
          showNotification(`✅ Загружен: ${f.name}`);
        };
        reader.readAsDataURL(f);
      }
    }
    input.value = '';
  }

  function closeModal() { document.getElementById('modal').classList.remove('active'); }
  function updateBgColorFromPicker(v) { document.getElementById('bgColorText').value = v; data.settings.bgColor = v; applySettings(); }
  function updateBgColorFromText(v) { if (/^#[0-9a-f]{6}$/i.test(v) || /^#[0-9a-f]{3}$/i.test(v)) { document.getElementById('bgColor').value = v; data.settings.bgColor = v; applySettings(); } }
  function updateTextColorFromPicker(v) { document.getElementById('textColorText').value = v; data.settings.textColor = v; applySettings(); }
  function updateTextColorFromText(v) { 
    if (/^#[0-9a-f]{6}$/i.test(v) || /^#[0-9a-f]{3}$/i.test(v)) { 
      document.getElementById('textColor').value = v; 
      data.settings.textColor = v; 
      applySettings(); 
    } 
  }
  function updateGradientColorFromText(index, value) { if (/^#[0-9a-f]{6}$/i.test(value) || /^#[0-9a-f]{3}$/i.test(value)) { const input = document.getElementById('gradientColor_' + index); if (input) { input.value = value; data.settings.gradientColors[index] = value; applySettings(); } } }
  function addGradientColor() { if (!data.settings.gradientColors) data.settings.gradientColors = []; data.settings.gradientColors.push('#3c3c3c'); saveDataToFile(); openSettings(); }
  function removeGradientColor(index) { if (data.settings.gradientColors.length > 0) { data.settings.gradientColors.splice(index, 1); saveDataToFile(); openSettings(); } }
  function moveGradientColor(index, dir) { const ni = index + dir; if (ni < 0 || ni >= data.settings.gradientColors.length) return; const temp = data.settings.gradientColors[index]; data.settings.gradientColors[index] = data.settings.gradientColors[ni]; data.settings.gradientColors[ni] = temp; saveDataToFile(); openSettings(); }
  function clearGradient() { data.settings.gradientColors = []; saveDataToFile(); openSettings(); }
  function updateGradientColor(index, color) { if (data.settings.gradientColors && index < data.settings.gradientColors.length) { data.settings.gradientColors[index] = color; const textInput = document.querySelectorAll('#gradientColors .color-input-wrapper input[type="text"]')[index]; if (textInput) textInput.value = color; applySettings(); } }
  function loadBackgroundImage(input) { const file = input.files[0]; if (file) { const reader = new FileReader(); reader.onload = function(e) { data.settings.bgImage = e.target.result; saveDataToFile(); applySettings(); openSettings(); showNotification('✅ Изображение загружено!'); }; reader.readAsDataURL(file); } }
  function removeBgImage() { data.settings.bgImage = null; saveDataToFile(); applySettings(); openSettings(); showNotification('✅ Изображение удалено!'); }
  function saveSettings() {
    data.settings.bgColor = document.getElementById('bgColor').value;
    data.settings.textColor = document.getElementById('textColor').value;
    const colorInputs = document.querySelectorAll('#gradientColors input[type="color"]');
    if (colorInputs.length > 0) data.settings.gradientColors = Array.from(colorInputs).map(i => i.value);
    else data.settings.gradientColors = [];
    data.settings.musicVolume = parseInt(document.getElementById('musicVolume').value);
    data.settings.soundEffects = document.getElementById('soundEffects').checked;
    applySettings(); saveDataToFile(); closeModal(); showNotification('✅ Настройки сохранены!');
  }
  function resetAll() { if (confirm('Сбросить все?')) { data = { tasks: [], completed: [], store: [], tempTasks: [], notes: [], balance: 0, piggyBalance: 0, settings: { bgColor: '#2b2b2b', textColor: '#ffffff', gradientColors: ['#2b2b2b', '#1a1a2e'], bgImage: null, musicVolume: 100, soundEffects: true, customMusic: [] } }; saveDataToFile(); applySettings(); renderCalendar(); renderDayTasks(new Date()); updateBalance(); renderNotes(); closeModal(); showNotification('✅ Сброшено!'); } }
  
  function applySettings() {
    document.getElementById('bgLayer').style.backgroundColor = data.settings.bgColor;
    const gradientLayer = document.getElementById('gradientLayer');
    if (data.settings.gradientColors && data.settings.gradientColors.length > 1) { 
      gradientLayer.style.background = `linear-gradient(to bottom, ${data.settings.gradientColors.join(', ')})`; 
      gradientLayer.style.display = 'block'; 
    } else { 
      gradientLayer.style.display = 'none'; 
    }
    const imageLayer = document.getElementById('imageLayer');
    if (data.settings.bgImage) { 
      imageLayer.style.backgroundImage = `url(${data.settings.bgImage})`; 
      imageLayer.style.display = 'block'; 
    } else { 
      imageLayer.style.display = 'none'; 
    }
    
    const textColor = data.settings.textColor || '#ffffff';
    document.documentElement.style.setProperty('--text-color', textColor);
    document.documentElement.style.setProperty('--bg-color', data.settings.bgColor);
    
    const style = document.createElement('style');
    style.id = 'dynamic-text-color';
    style.textContent = `
      .app-container, .top-bar, .balance-area, .balance-area .value, .balance-area .icon,
      .music-controls, .music-controls button, .settings-btn, .calendar-wrapper,
      .calendar-header, .calendar-header button, .calendar-header .month-year, .calendar-header .month-year span,
      .weekday-names, .weekday-names span, .week-day-cell, .week-day-cell .day-num,
      .tasks-panel, .tasks-header, .tasks-header span, .task-item .task-text,
      .timer-row button, .timer-panel, .timer-panel *:not(input), .stopwatch-panel, .stopwatch-panel *:not(input),
      .stats-panel, .stats-panel *, .btn-done, .drag-arrow, .note-text {
        color: ${textColor} !important;
      }
      .task-points {
        color: #ffd54f !important;
      }
      .timer-input-row input {
        color: ${textColor} !important;
      }
    `;
    const oldStyle = document.getElementById('dynamic-text-color');
    if (oldStyle) oldStyle.remove();
    document.head.appendChild(style);
    
    updateMusicVolume();
  }
  
  function updateMusicVolume() { if (musicAudio) { musicAudio.volume = Math.min(1, data.settings.musicVolume / 60); } }
  
  function showNotification(msg) { const n = document.getElementById('notification'); n.textContent = msg; n.classList.add('show'); clearTimeout(n.timeout); n.timeout = setTimeout(() => n.classList.remove('show'), 3000); }

  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
